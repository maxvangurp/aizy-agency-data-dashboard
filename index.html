<!DOCTYPE html>
<html lang="nl" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aizy Agency Data Dashboard</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='0'%3E%3Cstop offset='0' stop-color='%236935CC'/%3E%3Cstop offset='1' stop-color='%23FF47D8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M19 13h13.3a12.9 12.9 0 1 1 0 25.8H19V13Zm8.4 8.2v9.4h4.6a4.7 4.7 0 1 0 0-9.4h-4.6Zm0 15.3v7.2h4.7a3.6 3.6 0 0 0 0-7.2h-4.7Z' fill='white'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script>
      // Thema vroeg toepassen om een flits van het verkeerde thema te voorkomen.
      (function () {
        try {
          var stored = localStorage.getItem('aizy.theme');
          var theme = stored === 'dark' || stored === 'light'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#pageRoot">Ga naar de inhoud</a>

    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64">
              <path d="M19 13h13.3a12.9 12.9 0 1 1 0 25.8H19V13Zm8.4 8.2v9.4h4.6a4.7 4.7 0 1 0 0-9.4h-4.6Zm0 15.3v7.2h4.7a3.6 3.6 0 0 0 0-7.2h-4.7Z"></path>
            </svg>
          </div>
          <div>
            <div class="brand-title">Aizy</div>
            <div class="brand-sub">Agency Data Dashboard</div>
          </div>
        </div>
        <nav class="nav" id="nav" aria-label="Hoofdnavigatie"></nav>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="filters">
            <div class="field">
              <label for="customerFilter">Klant</label>
              <select id="customerFilter"></select>
            </div>
            <div class="field">
              <label for="channelFilter">Kanaal</label>
              <select id="channelFilter"></select>
            </div>
            <div class="field">
              <label for="periodFilter">Periode</label>
              <select id="periodFilter"></select>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="btn ghost" id="viewBtn" type="button">Agencyview</button>
            <button class="btn ghost" id="modeBtn" type="button">Demodata</button>
            <button class="btn ghost" id="themeBtn" type="button">Donkere modus</button>
          </div>
        </div>

        <div id="pageRoot" class="page-root" tabindex="-1"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
